<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="styles.css" />
  <style>
    .err-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 40px;
      background: #ffffff;
    }
    .err-code {
      font-family: var(--font-mono);
      font-size: 96px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(103, 232, 249, 0.22);
      line-height: 1;
    }
    .err-title {
      font-size: 28px;
      font-weight: 700;
      margin: 20px 0 12px;
    }
    .err-desc {
      color: var(--text-secondary);
      max-width: 420px;
      margin: 0 auto 28px;
    }
    .err-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="ambient-grid" aria-hidden="true"></div>
  <main class="err-page">
    <div>
      <div class="err-code">404</div>
      <h1 class="err-title">Session not found</h1>
      <p class="err-desc">The page you requested is not in our audit log. It may have expired or never existed.</p>
      <div class="err-actions">
        <a class="btn btn-primary" href="index.html">Return home</a>
